name: AppiOS CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'AppiOS/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'AppiOS/**'
  workflow_dispatch:

jobs:
  test:
    name: AppiOS - Build and Test
    permissions:
      contents: read    
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./AppiOS

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create certificates
        working-directory: ./server
        run: cargo build  

      - name: Test
        run: xcodebuild test -scheme MobileTiltMouse -destination "platform=iOS Simulator,name=iPhone 17"  
        # -only-testing MobileTiltMouseUITests/MobileTiltMouseUITests
    
      - name: Archive test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: /Users/runner/Library/Developer/Xcode/DerivedData/MobileTiltMouse-*/Logs/Test/Test-MobileTiltMouse*.xcresult
          