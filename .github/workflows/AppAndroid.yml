name: AppAndroid CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'AppAndroid/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'AppAndroid/**'    
  workflow_dispatch:

jobs:
  test:
    name: AppAndroid - Build and Test 
    permissions:
      contents: read    
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./AppAndroid

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create certificates
      working-directory: ./server
      run: |
        sudo apt update && sudo apt install -y libxdo-dev xorg-dev libxcb-shape0-dev libxcb-xfixes0-dev clang avahi-daemon libavahi-client-dev 
        cargo build      

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run unit test
      run: ./gradlew test

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run Instrumented tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        profile: medium_phone
        working-directory: ./AppAndroid/
        script: ./gradlew connectedDebugAndroidTest

