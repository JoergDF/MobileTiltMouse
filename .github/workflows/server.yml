name: server CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:


env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./server
        
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Get rust version
      run: rustc --version --verbose
    - name: Get cargo version
      run: cargo --version --verbose
    - name: Build
      run: cargo build
    - name: Run tests
      run: cargo test
